<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Signal Observatory | Web Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Signal Observatory</p>
          <h1>Live Spectrum Dashboard</h1>
        </div>
        <div class="status-pill" id="connectionState">Connecting</div>
      </header>

      <section class="dashboard-grid" aria-label="Instrument dashboard">
        <article class="panel status-panel">
          <div class="panel-header">
            <h2>Instrument</h2>
            <button id="refreshButton" class="tool-button" type="button">Refresh</button>
          </div>
          <dl class="status-list">
            <div>
              <dt>Host</dt>
              <dd id="hostReadout">-</dd>
            </div>
            <div>
              <dt>Source</dt>
              <dd id="sourceReadout">-</dd>
            </div>
            <div>
              <dt>Mode</dt>
              <dd id="sourceModeReadout">-</dd>
            </div>
            <div>
              <dt>Acquisition</dt>
              <dd id="sourceAcquisitionReadout">-</dd>
            </div>
            <div>
              <dt>Hardware</dt>
              <dd id="sourceHardwareReadout">-</dd>
            </div>
            <div>
              <dt>Sample Rate</dt>
              <dd id="sampleRateReadout">-</dd>
            </div>
            <div>
              <dt>FFT Size</dt>
              <dd id="fftSizeReadout">-</dd>
            </div>
            <div>
              <dt>Bin Spacing</dt>
              <dd id="binSpacingReadout">-</dd>
            </div>
            <div>
              <dt>Last Frame</dt>
              <dd id="lastFrameReadout">-</dd>
            </div>
          </dl>
        </article>

        <article class="panel spectrum-panel">
          <div class="panel-header">
            <h2>Spectrum</h2>
            <div class="readout-row" id="peakReadouts"></div>
          </div>
          <canvas id="spectrumCanvas" width="1040" height="460" aria-label="Synthetic FFT spectrum"></canvas>
        </article>

        <article class="panel waveform-panel">
          <div class="panel-header">
            <h2>Waveform</h2>
            <p>4 ms sample window</p>
          </div>
          <canvas id="waveformCanvas" width="1040" height="300" aria-label="Synthetic time-domain waveform"></canvas>
        </article>

        <article class="panel concept-panel">
          <h2>Signal Path</h2>
          <div class="path-diagram" id="pathDiagram" aria-label="Signal path diagram">
            <span>Source</span>
            <span>Samples</span>
            <span>FFT</span>
            <span>Browser Plot</span>
          </div>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
